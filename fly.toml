# fly.toml — 24/7 ishlash uchun sozlangan
app = 'mukmlnkrutka'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  DB_PATH = '/data/smm_bot.db'
  TZ = 'Asia/Tashkent'
  PORT = '8080'

[processes]
  app = 'python -u bot.py'

[[mounts]]
  source = 'bot_data'
  destination = '/data'

# HTTP service — Fly machine'ni "alive" deb hisoblashi uchun
# bot ichida 8080 portda kichik healthcheck server ishlaydi.
[http_service]
  internal_port = 8080
  force_https = true
  # MUHIM: bot 24/7 ishlashi uchun avtomatik to'xtatishni o'chiramiz
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    timeout = '10s'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
