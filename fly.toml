# fly.toml app configuration file generated for mukmlnkrutka on 2026-04-30T12:08:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mukmlnkrutka'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  DB_PATH = '/data/smm_bot.db'
  PORT = '8080'
  TZ = 'Asia/Tashkent'

[processes]
  app = 'python -u bot.py'

[[mounts]]
  source = 'bot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
